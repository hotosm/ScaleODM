# Name override for the chart
nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# ScaleODM API configuration
api:
  image:
    repository: ghcr.io/hotosm/scaleodm
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 31100
    targetPort: 31100

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Port configuration
  port: 31100

  # Security context
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # Node selector, tolerations, and affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    livenessPath: /__lbheartbeat__
    readinessPath: /__heartbeat__

# Runtime secret contract
secrets:
  runtime:
    # Canonical secret that contains all runtime variables consumed by the API
    # Deployment and workflow pods.
    name: "scaleodm-secrets"
    keys:
      databaseUrl: "SCALEODM_DATABASE_URL"
      s3Endpoint: "AWS_S3_ENDPOINT"
      accessKey: "AWS_ACCESS_KEY_ID"
      secretKey: "AWS_SECRET_ACCESS_KEY"
      region: "AWS_DEFAULT_REGION"

# Database configuration
database:
  # Optional: Deploy PostgreSQL as a subchart.
  # NOTE: For production, prefer an operator-managed or externally provisioned
  # database and provide SCALEODM_DATABASE_URL via secrets.runtime.
  postgres:
    enabled: false
    auth:
      username: scaleodm
      password: ""
      database: scaleodm
    primary:
      persistence:
        enabled: true
        size: 20Gi

# S3 configuration
s3:
  # Use an externally managed S3-compatible object store via runtime secret keys.
  external:
    enabled: true

  # Optional: deploy RustFS in-cluster for local development/testing.
  # When enabled, set s3.external.enabled=false so the chart can synthesize
  # runtime secret S3 keys from these values.
  rustfs:
    enabled: false
    endpoint: ""
    port: 9000
    auth:
      accessKey: "odm"
      secretKey: "somelongpassword"
    region: "us-east-1"

# Kubernetes configuration
kubernetes:
  # ServiceAccount configuration
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # ServiceAccount used by workflow pods (argo-odm).
  # Created in the release namespace alongside ScaleODM.
  workflowServiceAccount:
    create: true
    name: "argo-odm"

  # RBAC configuration
  rbac:
    create: true
    # Role permissions needed for Argo Workflows
    # The service account needs permissions to create/list/watch workflows

# Configuration (non-sensitive)
config:
  # ODM image to use in workflows
  odmImage: "docker.io/opendronemap/odm:3.5.6"

  s3EndpointPolicy:
    enforceAllowlist: false
    allowedEndpoints: ""

  workflowMissingGraceSeconds: 300

  server:
    readHeaderTimeoutSeconds: 10
    readTimeoutSeconds: 30
    writeTimeoutSeconds: 300
    idleTimeoutSeconds: 120

  readiness:
    checkS3: false
    s3ProbePath: ""
    timeoutSeconds: 5

  ui:
    enabled: true
    readOnly: true

  observability:
    enabled: false
    serviceName: "scaleodm"
    serviceVersion: "0.3.0"
    otlpEndpoint: ""
    otlpInsecure: false
    metricsEnabled: true
    tracesEnabled: true
    traceSampleRatio: 0.1

  workflow:
    activeDeadlineSeconds: 21600
    workspace:
      mode: auto
      size: "30Gi"
      storageClass: ""
      accessMode: ReadWriteOnce
      dynamicSize:
        enabled: false
        multiplier: 4
        minGiB: 30
        maxGiB: 1024
        fallbackMBPerImage: 20
    retryLimit: 1
    retryBackoffDuration: "60s"
    retryBackoffFactor: "2"
    retryBackoffMaxDuration: "10m"
    ttlSuccessSeconds: 86400
    ttlFailureSeconds: 604800
    podGCStrategy: "OnWorkflowSuccess"
    podGCDeleteDelaySeconds: 300

    resources:
      download:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "2Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "6Gi"
      process:
        requests:
          cpu: "2000m"
          memory: "8Gi"
          ephemeralStorage: "20Gi"
        limits:
          cpu: "4000m"
          memory: "10Gi"
          ephemeralStorage: "30Gi"
      upload:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "4Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "8Gi"
      cleanup:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeralStorage: "1Gi"
        limits:
          cpu: "1"
          memory: "1Gi"
          ephemeralStorage: "2Gi"

  processSizing:
    memoryLimitMarginPercent: 20
    memoryMinGiB: 4
    memoryMaxGiB: 256
    cpuPerGiB: 0.25
    cpuLimitMultiplier: 1.5
    ephemeralGiBPerGiBRAM: 1
    ephemeralLimitMultiplier: 1.2

# Argo Workflows subchart configuration
argo:
  enabled: true
  # Argo Workflows will be deployed as a subchart if enabled.
  # If disabled, ensure Argo Workflows is already installed in the cluster.
  # The Argo controller runs in its own namespace but scans all namespaces
  # for workflow CRDs. ScaleODM workflows run in the release namespace.

  # Common Argo Workflows values
  server:
    enabled: true
    service:
      type: ClusterIP

  controller:
    enabled: true
    # Parallelism configuration to prevent overwhelming worker nodes
    # This limits the total number of workflows that can run concurrently
    # across the entire cluster. Recommended: (number of worker nodes) * 2-3
    # For example: 3 worker nodes = 6-9 concurrent workflows
    # Set to 0 to disable the limit (not recommended for production)
    parallelism: 10

  # Argo controller namespace. Only used when argo.enabled=true.
  # The controller watches all namespaces for workflows.
  namespaceOverride: argo

# Ingress configuration (optional, UI-only)
ingress:
  # Enables ingress that exposes only /ui and /ui/... routes.
  # This is safe with api.service.type=ClusterIP because browser requests hit
  # /ui/api on the same ingress host, then the in-cluster UI handler fetches
  # internal data server-side and returns JSON to the browser.
  # Security guardrail: requires config.ui.enabled=true.
  enabled: false
  className: ""
  annotations: {}
  # Hostnames for the UI-only ingress rule.
  hosts:
    - host: scaleodm.local
  tls: []
