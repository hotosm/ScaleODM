# Name override for the chart
nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# ScaleODM API configuration
api:
  image:
    repository: ghcr.io/hotosm/scaleodm
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 31100
    targetPort: 31100

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Port configuration
  port: 31100

  # Security context
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # Node selector, tolerations, and affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    livenessPath: /__lbheartbeat__
    readinessPath: /__heartbeat__

# Runtime secret contract
secrets:
  runtime:
    # Canonical secret that contains all runtime variables consumed by the API
    # Deployment and workflow pods.
    name: "scaleodm-secrets"
    keys:
      databaseUrl: "SCALEODM_DATABASE_URL"
      s3Endpoint: "AWS_S3_ENDPOINT"
      accessKey: "AWS_ACCESS_KEY_ID"
      secretKey: "AWS_SECRET_ACCESS_KEY"
      region: "AWS_DEFAULT_REGION"

# Database configuration
database:
  # Use an existing Kubernetes Secret for runtime variables.
  # The secret should contain a key with the full PostgreSQL URI
  # (e.g. postgres://user:password@host:port/database?sslmode=disable).
  external:
    enabled: true
    secret:
      # Deprecated compatibility alias for secrets.runtime.name.
      name: ""
      # Deprecated compatibility alias for secrets.runtime.keys.databaseUrl.
      key: ""

  # Optional: Deploy PostgreSQL as a subchart when external.enabled is false.
  # NOTE: This path is mainly for development; for production, prefer an
  # operator-managed or externally provisioned database and runtime secret.
  postgres:
    enabled: false
    auth:
      username: scaleodm
      password: ""
      database: scaleodm
    primary:
      persistence:
        enabled: true
        size: 20Gi

# S3 configuration
s3:
  # Use an existing Kubernetes Secret for S3 configuration. This secret
  # must live in the same namespace as ScaleODM (the release namespace)
  # and contain the keys configured under secrets.runtime.keys.
  # AWS_DEFAULT_REGION defaults to us-east-1 in runtime if omitted, but set it
  # explicitly in the runtime secret when your object store requires a specific region.
  external:
    enabled: true
    secret:
      # Deprecated compatibility alias for secrets.runtime.name.
      name: ""
      keys:
        # Deprecated compatibility aliases for secrets.runtime.keys.*.
        endpoint: ""
        accessKey: ""
        secretKey: ""

  # Deprecated compatibility alias for secrets.runtime.* in workflow pods.
  workflowSecret:
    name: ""
    region: ""

  # Optional: Deploy Garage S3 in-cluster when external.enabled is false.
  garage:
    enabled: false
    image:
      repository: docker.io/dxflrs/garage
      tag: v1.3.1
      pullPolicy: IfNotPresent
    auth:
      accessKey: ""
      secretKey: ""
    bucket:
      name: scaleodm
      keyName: scaleodm
    admin:
      token: ""
    rpc:
      secret: ""
      replicationFactor: 1
    persistence:
      enabled: true
      size: 100Gi
      storageClass: ""

# Kubernetes configuration
kubernetes:
  # ServiceAccount configuration
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # ServiceAccount used by workflow pods (argo-odm).
  # Created in the release namespace alongside ScaleODM.
  workflowServiceAccount:
    create: true
    name: "argo-odm"

  # RBAC configuration
  rbac:
    create: true
    # Role permissions needed for Argo Workflows
    # The service account needs permissions to create/list/watch workflows

# Configuration (non-sensitive)
config:
  # ODM image to use in workflows
  odmImage: "docker.io/opendronemap/odm:3.5.6"

  # Enqueue test jobs (for testing)
  enqueueTestJobs: "false"

  s3EndpointPolicy:
    enforceAllowlist: false
    allowedEndpoints: ""

  workflowMissingGraceSeconds: 300

  server:
    readHeaderTimeoutSeconds: 10
    readTimeoutSeconds: 30
    writeTimeoutSeconds: 300
    idleTimeoutSeconds: 120

  readiness:
    checkS3: false
    s3ProbePath: ""
    timeoutSeconds: 5

  ui:
    enabled: true
    readOnly: true

  observability:
    enabled: false
    serviceName: "scaleodm"
    serviceVersion: "0.3.0"
    otlpEndpoint: ""
    otlpInsecure: false
    metricsEnabled: true
    tracesEnabled: true
    traceSampleRatio: 0.1

  workflow:
    activeDeadlineSeconds: 21600
    workspace:
      mode: auto
      size: "30Gi"
      storageClass: ""
      accessMode: ReadWriteOnce
      dynamicSize:
        enabled: false
        multiplier: 4
        minGiB: 30
        maxGiB: 1024
        fallbackMBPerImage: 20
    retryLimit: 1
    retryBackoffDuration: "60s"
    retryBackoffFactor: "2"
    retryBackoffMaxDuration: "10m"
    ttlSuccessSeconds: 86400
    ttlFailureSeconds: 604800
    podGCStrategy: "OnWorkflowSuccess"
    podGCDeleteDelaySeconds: 300

    resources:
      download:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "2Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "6Gi"
      process:
        requests:
          cpu: "2000m"
          memory: "8Gi"
          ephemeralStorage: "20Gi"
        limits:
          cpu: "4000m"
          memory: "10Gi"
          ephemeralStorage: "30Gi"
      upload:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "4Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "8Gi"
      cleanup:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeralStorage: "1Gi"
        limits:
          cpu: "1"
          memory: "1Gi"
          ephemeralStorage: "2Gi"

  processSizing:
    memoryLimitMarginPercent: 20
    memoryMinGiB: 4
    memoryMaxGiB: 256
    cpuPerGiB: 0.25
    cpuLimitMultiplier: 1.5
    ephemeralGiBPerGiBRAM: 1
    ephemeralLimitMultiplier: 1.2

# Argo Workflows subchart configuration
argo:
  enabled: true
  # Argo Workflows will be deployed as a subchart if enabled.
  # If disabled, ensure Argo Workflows is already installed in the cluster.
  # The Argo controller runs in its own namespace but scans all namespaces
  # for workflow CRDs. ScaleODM workflows run in the release namespace.

  # Common Argo Workflows values
  server:
    enabled: true
    service:
      type: ClusterIP

  controller:
    enabled: true
    # Parallelism configuration to prevent overwhelming worker nodes
    # This limits the total number of workflows that can run concurrently
    # across the entire cluster. Recommended: (number of worker nodes) * 2-3
    # For example: 3 worker nodes = 6-9 concurrent workflows
    # Set to 0 to disable the limit (not recommended for production)
    parallelism: 10

  # Argo controller namespace. Only used when argo.enabled=true.
  # The controller watches all namespaces for workflows.
  namespaceOverride: argo

# Ingress configuration (optional, UI-only)
ingress:
  # Enables ingress that exposes only /ui and /ui/... routes.
  # Security guardrail: requires config.ui.enabled=true.
  enabled: false
  className: ""
  annotations: {}
  # Hostnames for the UI-only ingress rule.
  hosts:
    - host: scaleodm.local
      # paths are accepted for backward compatibility but ignored;
      # chart ingress always routes only /ui with Prefix pathType.
      paths:
        - path: /
          pathType: Prefix
  tls: []
