# Name override for the chart
nameOverride: ""
fullnameOverride: ""

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# ScaleODM API configuration
api:
  image:
    repository: ghcr.io/hotosm/scaleodm
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 31100
    targetPort: 31100

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Port configuration
  port: 31100

  # Security context
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # Node selector, tolerations, and affinity
  nodeSelector: {}
  tolerations: []
  affinity: {}

  probes:
    livenessPath: /__lbheartbeat__
    readinessPath: /__heartbeat__

# Runtime secret contract
secrets:
  runtime:
    # Canonical secret that contains all runtime variables consumed by the API
    # Deployment and workflow pods.
    name: "scaleodm-secrets"
    keys:
      databaseUrl: "SCALEODM_DATABASE_URL"
      s3Endpoint: "AWS_S3_ENDPOINT"
      accessKey: "AWS_ACCESS_KEY_ID"
      secretKey: "AWS_SECRET_ACCESS_KEY"
      region: "AWS_DEFAULT_REGION"

# Database configuration
database:
  # Optional: Deploy PostgreSQL as a subchart.
  # NOTE: For production, prefer an operator-managed or externally provisioned
  # database and provide SCALEODM_DATABASE_URL via secrets.runtime.
  postgres:
    enabled: false
    auth:
      username: scaleodm
      password: ""
      database: scaleodm
    primary:
      persistence:
        enabled: true
        size: 20Gi

# S3 configuration
s3:
  # Use an externally managed S3-compatible object store via runtime secret keys.
  external:
    enabled: true

  # Optional: deploy RustFS in-cluster for local development/testing.
  # When enabled, set s3.external.enabled=false so the chart can synthesize
  # runtime secret S3 keys from these values.
  rustfs:
    enabled: false
    endpoint: ""
    port: 9000
    auth:
      accessKey: "admin"
      secretKey: "somelongpassword"
    region: "us-east-1"

# Kubernetes configuration
kubernetes:
  # ServiceAccount configuration
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # ServiceAccount used by workflow pods (argo-odm).
  # Created in the release namespace alongside ScaleODM.
  workflowServiceAccount:
    create: true
    name: "argo-odm"

  # RBAC configuration
  rbac:
    create: true
    # Role permissions needed for Argo Workflows
    # The service account needs permissions to create/list/watch workflows

# Optional StorageClass for workflow workspace PVCs.
# Useful when the cluster default StorageClass has reclaimPolicy: Retain but
# you want ephemeral workspace volumes to be deleted automatically.
#
# IMPORTANT: setting config.workflow.workspace.storageClass (or creating this
# StorageClass and referencing it) switches the workspace from emptyDir to PVC
# mode. In PVC mode the process container's ephemeral storage requirement drops
# significantly - see the ephemeralGiBPerGiBRAM note under config.processSizing.
workspaceStorageClass:
  create: false
  name: "scaleodm-workspace"
  provisioner: "ebs.csi.aws.com"
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true
  parameters:
    type: gp3
    fsType: ext4
    encrypted: "true"

# Configuration (non-sensitive)
config:
  # ODM image to use in workflows
  odmImage: "ghcr.io/hotosm/odm:3.6.0"

  s3EndpointPolicy:
    enforceAllowlist: false
    allowedEndpoints: ""

  workflowMissingGraceSeconds: 300

  server:
    readHeaderTimeoutSeconds: 10
    readTimeoutSeconds: 30
    writeTimeoutSeconds: 300
    idleTimeoutSeconds: 120

  readiness:
    checkS3: false
    s3ProbePath: ""
    timeoutSeconds: 5

  ui:
    enabled: true
    readOnly: true

  observability:
    enabled: false
    serviceName: "scaleodm"
    # Leave empty to inherit the chart's appVersion (recommended); set only
    # to override the version reported by the observability layer.
    serviceVersion: ""
    otlpEndpoint: ""
    otlpInsecure: false
    metricsEnabled: true
    tracesEnabled: true
    traceSampleRatio: 0.1

  workflow:
    activeDeadlineSeconds: 21600
    workspace:
      mode: auto
      size: "30Gi"
      storageClass: ""
      accessMode: ReadWriteOnce
      dynamicSize:
        enabled: true
        maxGiB: 1024
        fallbackMBPerImage: 20
        # --fast-orthophoto skips dense reconstruction; everything else uses standard.
        fastOrtho:
          multiplier: 3
          minGiB: 30
        standard:
          multiplier: 8
          minGiB: 70
    retryLimit: 1
    retryBackoffDuration: "60s"
    retryBackoffFactor: "2"
    retryBackoffMaxDuration: "6h"
    # Argo retryStrategy.retryPolicy. Which non-success phases trigger a retry:
    #   OnFailure        - phase=Failed (container exit != 0, e.g. ODM crash)
    #   OnError          - phase=Error  (infra: node loss, image pull)
    #   Always           - both
    #   OnTransientError - either, but only if Argo's IsTransientErr matches
    # OnError is the most reliable choice for retrying spot evictions only.
    retryPolicy: "OnTransientError"
    ttlSuccessSeconds: 86400
    ttlFailureSeconds: 604800
    podGCStrategy: "OnWorkflowSuccess"
    podGCDeleteDelaySeconds: 300
    # Default Karpenter node pool for workflow pods.
    # "spot" is cheapest; use "on-demand" for stable capacity.
    # Individual submissions can override this via the capacityType API field.
    capacityType: "spot"

    # These limits are not used in reality, but only the edge case when 0 images are counted.
    # We use a dynamic pod resource estimator, based on number of images to process.
    resources:
      download:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "2Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "6Gi"
      process:
        requests:
          cpu: "2000m"
          memory: "8Gi"
          ephemeralStorage: "20Gi"
        limits:
          cpu: "4000m"
          memory: "10Gi"
          ephemeralStorage: "30Gi"
      upload:
        requests:
          cpu: "500m"
          memory: "1Gi"
          ephemeralStorage: "4Gi"
        limits:
          cpu: "2"
          memory: "2Gi"
          ephemeralStorage: "8Gi"
      cleanup:
        requests:
          cpu: "250m"
          memory: "512Mi"
          ephemeralStorage: "1Gi"
        limits:
          cpu: "1"
          memory: "1Gi"
          ephemeralStorage: "2Gi"

  processSizing:
    memoryLimitMarginPercent: 20
    memoryMinGiB: 4
    memoryMaxGiB: 256
    # ODM processing is usually constrained by RAM, temporary storage, and I/O
    # before it scales linearly with CPU. Requesting 1 core per 8GiB keeps large
    # jobs schedulable while still giving bigger RAM estimates more CPU.
    cpuPerGiB: 0.125
    cpuLimitMultiplier: 1.5

    # Ephemeral storage for the process container. The formula is:
    #   request = max(10 GiB, estimatedRAM * ephemeralGiBPerGiBRAM)
    #   limit   = request * ephemeralLimitMultiplier
    #
    # Default (0.3) is sized for PVC-backed workspaces (cloud/gp3 or any StorageClass).
    # When config.workflow.workspace.storageClass is set, ODM writes all project data
    # to the workspace PVC. Ephemeral storage then only covers:
    #   - /tmp emptyDir (~1-5 GiB typical, 20 GiB hard limit)
    #   - container overlay (~2 GiB)
    # At 0.3 this yields ~10-15 GiB for most jobs, flooring at 10 GiB for small ones.
    # On-prem recommendation: provision a local StorageClass (e.g. rancher.io/local-path)
    # and set config.workflow.workspace.storageClass to keep this default.
    #
    # WARNING: if no storageClass is set the workspace falls back to an emptyDir volume,
    # which counts against the pod's ephemeral storage limit. In that mode ODM's full
    # working tree (point clouds, meshes, outputs) sits on ephemeral disk and 0.3 will
    # be far too low. Set this to 1.0 or higher for emptyDir deployments, or better:
    # configure a StorageClass so the workspace uses a PVC.
    ephemeralGiBPerGiBRAM: 0.3
    ephemeralLimitMultiplier: 1.2
    fastOrthoMemoryMultiplier: 0.5
    dsmDtmMemoryMultiplier: 1.5

# Argo Workflows subchart configuration
argo:
  enabled: true
  # Argo Workflows will be deployed as a subchart if enabled.
  # If disabled, ensure Argo Workflows is already installed in the cluster.
  # The Argo controller runs in its own namespace but scans all namespaces
  # for workflow CRDs. ScaleODM workflows run in the release namespace.

  # Common Argo Workflows values
  server:
    enabled: true
    service:
      type: ClusterIP

  controller:
    enabled: true
    # Parallelism configuration to prevent overwhelming worker nodes
    # This limits the total number of workflows that can run concurrently
    # across the entire cluster. Recommended: (number of worker nodes) * 2-3
    # For example: 3 worker nodes = 6-9 concurrent workflows
    # Set to 0 to disable the limit (not recommended for production)
    parallelism: 10

  # Argo controller namespace. Only used when argo.enabled=true.
  # The controller watches all namespaces for workflows.
  namespaceOverride: argo

# Ingress configuration (optional, UI-only)
ingress:
  # Enables ingress that exposes only /ui and /ui/... routes.
  # This is safe with api.service.type=ClusterIP because browser requests hit
  # /ui/api on the same ingress host, then the in-cluster UI handler fetches
  # internal data server-side and returns JSON to the browser.
  # Security guardrail: requires config.ui.enabled=true.
  enabled: false
  className: ""
  annotations: {}
  # Hostnames for the UI-only ingress rule.
  hosts:
    - host: scaleodm.local
  tls: []
