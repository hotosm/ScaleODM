{{- /*
  This Secret lives in the release namespace so that workflow pods can
  reference it via secretKeyRef. Since workflows also run in the release
  namespace, no cross-namespace access is needed.

  It is only created for in-cluster Garage mode, where Helm has direct access
  to the S3 credentials in values.yaml.

  For external S3 (s3.external.enabled=true), the operator must create the
  workflow secret in the release namespace.
*/ -}}
{{- if and (not .Values.s3.external.enabled) .Values.s3.garage.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.s3.workflowSecret.name | default "scaleodm-s3-creds" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "s3.garage.auth.accessKey is required" .Values.s3.garage.auth.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "s3.garage.auth.secretKey is required" .Values.s3.garage.auth.secretKey | quote }}
  AWS_DEFAULT_REGION: {{ .Values.s3.workflowSecret.region | default "us-east-1" | quote }}
{{- end }}
