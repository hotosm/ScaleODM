{{- $runtimeSecretName := coalesce .Values.database.external.secret.name .Values.s3.external.secret.name .Values.s3.workflowSecret.name .Values.secrets.runtime.name -}}
{{- $runtimeDatabaseKey := coalesce .Values.database.external.secret.key .Values.secrets.runtime.keys.databaseUrl -}}
{{- $runtimeS3EndpointKey := coalesce .Values.s3.external.secret.keys.endpoint .Values.secrets.runtime.keys.s3Endpoint -}}
{{- $runtimeS3AccessKey := coalesce .Values.s3.external.secret.keys.accessKey .Values.secrets.runtime.keys.accessKey -}}
{{- $runtimeS3SecretKey := coalesce .Values.s3.external.secret.keys.secretKey .Values.secrets.runtime.keys.secretKey -}}
{{- $runtimeS3RegionKey := .Values.secrets.runtime.keys.region -}}
{{- $runtimeRegionValue := coalesce .Values.s3.workflowSecret.region "us-east-1" -}}
{{- if or (not .Values.database.external.enabled) (not .Values.s3.external.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $runtimeSecretName }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.database.external.enabled }}
  # Database URL for in-cluster Postgres (subchart).
  {{- if .Values.database.postgres.enabled }}
  {{ $runtimeDatabaseKey }}: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s?sslmode=disable" .Values.database.postgres.auth.username .Values.database.postgres.auth.password .Release.Name .Values.database.postgres.auth.database | quote }}
  {{- else }}
  {{ required "Either database.external.enabled=true or database.postgres.enabled=true must be set" "" }}
  {{- end }}
  {{- end }}
  {{- if not .Values.s3.external.enabled }}
  # In-cluster Garage S3 settings.
  {{- if .Values.s3.garage.enabled }}
  {{ $runtimeS3EndpointKey }}: {{ printf "%s-garage:3900" (include "scaleodm.fullname" .) | quote }}
  {{- else }}
  {{ required "Either s3.external.enabled=true or s3.garage.enabled=true must be set" "" }}
  {{- end }}
  {{ $runtimeS3AccessKey }}: {{ required "s3.garage.auth.accessKey is required when s3.external.enabled=false" .Values.s3.garage.auth.accessKey | quote }}
  {{ $runtimeS3SecretKey }}: {{ required "s3.garage.auth.secretKey is required when s3.external.enabled=false" .Values.s3.garage.auth.secretKey | quote }}
  {{ $runtimeS3RegionKey }}: {{ $runtimeRegionValue | quote }}
  {{- end }}
{{- end }}
