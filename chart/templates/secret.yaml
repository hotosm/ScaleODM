{{- $runtimeSecretName := .Values.secrets.runtime.name -}}
{{- $runtimeDatabaseKey := .Values.secrets.runtime.keys.databaseUrl -}}
{{- $runtimeS3EndpointKey := .Values.secrets.runtime.keys.s3Endpoint -}}
{{- $runtimeS3AccessKey := .Values.secrets.runtime.keys.accessKey -}}
{{- $runtimeS3SecretKey := .Values.secrets.runtime.keys.secretKey -}}
{{- $runtimeS3RegionKey := .Values.secrets.runtime.keys.region -}}
{{- if or .Values.database.postgres.enabled (not .Values.s3.external.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $runtimeSecretName }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.database.postgres.enabled }}
  # Database URL for in-cluster Postgres (subchart).
  {{ $runtimeDatabaseKey }}: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s?sslmode=disable" .Values.database.postgres.auth.username .Values.database.postgres.auth.password .Release.Name .Values.database.postgres.auth.database | quote }}
  {{- end }}

  {{- if not .Values.s3.external.enabled }}
  # S3 settings for in-cluster RustFS.
  {{- if .Values.s3.rustfs.enabled }}
  {{- $rustfsService := .Values.s3.rustfs.endpoint | default (printf "%s-rustfs" .Release.Name) -}}
  {{ $runtimeS3EndpointKey }}: {{ printf "http://%s:%v" $rustfsService .Values.s3.rustfs.port | quote }}
  {{ $runtimeS3AccessKey }}: {{ required "s3.rustfs.auth.accessKey is required when s3.external.enabled=false" .Values.s3.rustfs.auth.accessKey | quote }}
  {{ $runtimeS3SecretKey }}: {{ required "s3.rustfs.auth.secretKey is required when s3.external.enabled=false" .Values.s3.rustfs.auth.secretKey | quote }}
  {{ $runtimeS3RegionKey }}: {{ .Values.s3.rustfs.region | default "us-east-1" | quote }}
  {{- else }}
  {{ required "When s3.external.enabled=false, set s3.rustfs.enabled=true" "" }}
  {{- end }}
  {{- end }}
{{- end }}
