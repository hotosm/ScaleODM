{{- if and (not .Values.s3.external.enabled) .Values.s3.garage.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scaleodm.fullname" . }}-garage-config
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
type: Opaque
stringData:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"
    replication_factor = {{ .Values.s3.garage.rpc.replicationFactor | default 1 }}
    compression_level = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "{{ include "scaleodm.fullname" . }}-garage-0.{{ include "scaleodm.fullname" . }}-garage-internal.{{ .Release.Namespace }}.svc.cluster.local:3901"
    rpc_secret = {{ required "s3.garage.rpc.secret is required when s3.garage.enabled=true" .Values.s3.garage.rpc.secret | quote }}

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = {{ required "s3.garage.admin.token is required when s3.garage.enabled=true" .Values.s3.garage.admin.token | quote }}
{{- end }}
