{{- if .Values.kubernetes.workflowServiceAccount.create }}
# ServiceAccount used by ODM workflow pods, created in the release namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.kubernetes.workflowServiceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
---
# Minimum RBAC required by the Argo workflow executor for this SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "scaleodm.fullname" . }}-workflow-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "scaleodm.fullname" . }}-workflow-executor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleodm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "scaleodm.fullname" . }}-workflow-executor
subjects:
  - kind: ServiceAccount
    name: {{ .Values.kubernetes.workflowServiceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
