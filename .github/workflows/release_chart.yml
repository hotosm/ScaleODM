name: 🚀 Release Chart

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: hotosm/gh-workflows/.github/workflows/just.yml@4.0.1
    with:
      environment: "test"
      command: "chart publish"
    secrets: inherit
