# A compose override, to be run via:
# docker compose -f compose.yaml -f compose.test.yaml run --rm api
services:
  api:
    build:
      target: build
    # Use .test.env to force local Garage S3 settings for test runs.
    env_file: .test.env
    command: test -timeout=5m -v -p 1 -tags=e2e ./...
    restart: "no"
    healthcheck:
      disable: true

volumes:
  test-cache:
